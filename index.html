<!doctype html>
<html lang="de" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0b0e" />
    <meta name="description" content="Personal Workflow OS – tasks, dashboard and a Claude command center." />
    <title>Workflow OS</title>
    <!-- Resolve + apply the saved theme BEFORE first paint so there is no flash of the wrong theme. -->
    <script>
      (function () {
        var theme = 'dark';
        try {
          var raw = localStorage.getItem('wos:theme');
          if (raw) {
            var parsed = JSON.parse(raw);
            var t = parsed && parsed.state && parsed.state.theme;
            if (t === 'light' || t === 'dark') theme = t;
          }
        } catch (e) {}
        var bg = theme === 'light' ? '#eef1f7' : '#0a0b0e';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.backgroundColor = bg;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', bg);
      })();
    </script>
    <style>
      html,
      body,
      #root {
        background-color: var(--color-bg, #0a0b0e);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
